name: Build - server
run-name: "${{ github.run_id }}: Build server image for commit ${{ github.ref_name }}"
on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]

jobs:

    build:

        runs-on: ubuntu-latest

        steps:
        - uses: actions/checkout@v5
        - name: Build the server image
          run: docker build -t server-image:${{ github.sha }} ./server
